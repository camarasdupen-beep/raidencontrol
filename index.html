<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAIDEN</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4">

<h1 class="text-3xl font-bold mb-4">RAIDEN</h1>

<div id="status" class="mb-4 text-gray-400">
Cargando...
</div>

<div id="list" class="space-y-3"></div>

<script>

async function load(){

try{

const r = await fetch("/.netlify/functions/items");
const data = await r.json();

document.getElementById("status").innerHTML =
"Productos: " + (data.items?.length || 0);

const list = document.getElementById("list");

(data.items || []).forEach(p => {

list.innerHTML += `
<div class="bg-zinc-900 p-4 rounded-xl">
<div class="font-bold">${p.item_name}</div>
<div class="text-gray-400 text-sm">${p.sku || '-'}</div>
</div>
`;

});

}catch(e){

document.getElementById("status").innerHTML =
"ERROR: " + e.message;

console.error(e);

}

}

load();

</script>

</body>
</html>
